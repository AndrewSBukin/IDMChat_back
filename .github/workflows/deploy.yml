name: Deploy to Test Server

# Условия запуска: автоматически при пуше в ветку main или вручную из интерфейса GitHub
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    # Указываем, что runner должен быть наш, установленный ранее
    runs-on: self-hosted

    steps:
      # 1. Скачать код из репозитория
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Установить .NET 8 (версия должна совпадать с твоей)
      #- name: Setup .NET
      #  uses: actions/setup-dotnet@v4
      #  with:
      #    dotnet-version: '8.0.x'

      # 3. Восстановить NuGet пакеты и собрать проект
      - name: Restore and Build
        run: |
          dotnet restore
          dotnet build --configuration Release --no-restore

      # 4. Опубликовать приложение (создать готовые файлы в папке ./publish)
      - name: Publish
        run: dotnet publish -c Release -o ./publish --no-build

      # 5. Остановить сайт в IIS, чтобы файлы не были заблокированы
      - name: Stop IIS Site and App Pool
        run: |
          Import-Module WebAdministration
          Stop-WebSite -Name "chat_back"
          Stop-WebAppPool -Name "chat_back"  # Остановить пул приложений
          Start-Sleep -Seconds 3              # Подождать освобождения файлов
        shell: powershell

      # 6. Скопировать новые файлы на место (например, в C:\inetpub\wwwroot\твой_чат)
      - name: Deploy files
        run: |
          $source = "./publish/*"
          $destination = "C:\inetpub\wwwroot\chat_back"
          $retry = 0
          $maxRetries = 5
          while ($retry -lt $maxRetries) {
              try {
                  Copy-Item -Path $source -Destination $destination -Recurse -Force
                  break
              }
              catch {
                  $retry++
                  Write-Host "Ошибка копирования, попытка $retry из $maxRetries"
                  Start-Sleep -Seconds 2
              }
          }
        shell: powershell

      # 7. Запустить сайт снова
      - name: Start IIS Site
        run: |
          Import-Module WebAdministration
          Start-WebAppPool -Name "chat_back"
          Start-WebSite -Name "chat_back"
        shell: powershell